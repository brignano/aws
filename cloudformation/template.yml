AWSTemplateFormatVersion: "2010-09-09"

Parameters:
  BrignanioHostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for brignano.io
  AnthonyBrignanioHostedZoneId:
    Type: String
    Description: Route 53 Hosted Zone ID for anthonybrignano.com

Resources:
  TerraformOIDCProvider:
    Type: "AWS::IAM::OIDCProvider"
    Properties:
      Url: "https://app.terraform.io"
      ClientIdList:
        - "aws.workload.identity"
      ThumbprintList:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280

  TerraformCloudAssumeRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: "TerraformCloudAssumeRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Federated: !Ref TerraformOIDCProvider
            Action: "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringEquals:
                "app.terraform.io:aud": "aws.workload.identity"
              StringLike:
                "app.terraform.io:sub": "organization:brignano:project:*:workspace:*:run_phase:*"
      ManagedPolicyArns:
        - !Ref TerraformCloudAssumePolicy

  TerraformCloudAssumePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: TerraformCloudAssumePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Action:
              - "amplify:*"
            Resource: !Sub "arn:aws:amplify:${AWS::Region}:${AWS::AccountId}:apps/*"
          - Effect: "Allow"
            Action:
              - "route53:*"
            Resource:
              - !Sub "arn:aws:route53:::hostedzone/${BrignanioHostedZoneId}"
              - !Sub "arn:aws:route53:::hostedzone/${AnthonyBrignanioHostedZoneId}"
              - "arn:aws:route53:::change/*"
          - Effect: "Allow"
            Action:
              - "route53:ListHostedZones"
            Resource:
              - "*"
            Condition:
              StringEquals:
                "aws:PrincipalArn": !Sub "arn:aws:sts::${AWS::AccountId}:assumed-role/TerraformCloudAssumeRole/*"
          - Effect: "Allow"
            Action:
              - "s3:CreateBucket"
              - "s3:DeleteBucket"
              - "s3:GetBucketAcl"
              - "s3:PutBucketAcl"
              - "s3:GetBucketOwnershipControls"
              - "s3:PutBucketOwnershipControls"
              - "s3:GetBucketPolicy"
              - "s3:PutBucketPolicy"
              - "s3:DeleteBucketPolicy"
              - "s3:GetBucketVersioning"
              - "s3:PutBucketVersioning"
              - "s3:GetEncryptionConfiguration"
              - "s3:PutEncryptionConfiguration"
              - "s3:GetBucketTagging"
              - "s3:PutBucketTagging"
              - "s3:ListBucket"
            Resource:
              - "arn:aws:s3:::www.anthonybrignano.com"
              - "arn:aws:s3:::anthonybrignano.com"
              - "arn:aws:s3:::brignano.io-emails"
          - Effect: "Allow"
            Action:
              - "ses:Describe*"
              - "ses:Get*"
              - "ses:Set*"
              - "ses:Create*"
              - "ses:Update*"
              - "ses:Delete*"
            Resource: "*"
          - Effect: "Allow"
            Action:
              - "iam:List*"
              - "iam:Get*"
              - "iam:CreateRole"
              - "iam:TagRole"
              - "iam:UpdateRole"
              - "iam:DeleteRole"
              - "iam:CreatePolicy"
              - "iam:TagPolicy"
              - "iam:DeletePolicy"
              - "iam:AttachRolePolicy"
              - "iam:DetachRolePolicy"
              - "iam:PassRole"
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/LambdaAssumeRole"
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/Lambda*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/S3*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/Ses*"
          - Effect: "Allow"
            Action:
              - "iam:List*"
              - "iam:Get*"
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:role/*"
              - !Sub "arn:aws:iam::${AWS::AccountId}:policy/*"
          - Effect: "Allow"
            Action:
              - "lambda:Get*"
              - "lambda:List*"
              - "lambda:Create*"
              - "lambda:Update*"
              - "lambda:Delete*"
              - "lambda:Tag*"
              - "lambda:Add*"
              - "lambda:Remove*"
            Resource:
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
              - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:role:*"
          - Effect: "Allow"
            Action:
              - "sqs:CreateQueue"
              - "sqs:DeleteQueue"
              - "sqs:GetQueueAttributes"
              - "sqs:SetQueueAttributes"
              - "sqs:TagQueue"
              - "sqs:ListQueues"
              - "sqs:ListQueueTags"
            Resource:
              - !Sub "arn:aws:sqs:${AWS::Region}:${AWS::AccountId}:email-forwarder-dlq"
          - Effect: "Allow"
            Action:
              - "cloudwatch:PutMetricAlarm"
              - "cloudwatch:DeleteAlarms"
              - "cloudwatch:DescribeAlarms"
            Resource:
              - !Sub "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:email-forwarder-*"
          - Effect: "Allow"
            Action:
              - "sns:CreateTopic"
              - "sns:DeleteTopic"
              - "sns:GetTopicAttributes"
              - "sns:SetTopicAttributes"
              - "sns:TagResource"
              - "sns:ListTagsForResource"
              - "sns:Subscribe"
              - "sns:Unsubscribe"
              - "sns:ListSubscriptionsByTopic"
            Resource:
              - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:email-forwarder-alerts"
          - Effect: "Allow"
            Action:
              - "logs:CreateLogGroup"
              - "logs:DeleteLogGroup"
              - "logs:TagResource"
              - "logs:PutRetentionPolicy"
              - "logs:ListTagsLogGroup"
            Resource:
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"
          - Effect: "Allow"
            Action:
              - "logs:DescribeLogGroups"
            Resource:
              - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group::log-stream:"

Outputs:
  TerraformCloudAssumeRoleArn:
    Description: ARN of the Terraform Cloud Assume Role
    Value: !GetAtt TerraformCloudAssumeRole.Arn
